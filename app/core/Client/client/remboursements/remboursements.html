
<div class="remb-container">
<h2>Suivi des remboursements</h2>

<dx-button icon="add"  type="success" text="Nouvelle demande"  (onClick)="ajouter()" class="mb-2"></dx-button>

<dx-data-grid
  [dataSource]="remboursements"
  [showBorders]="true"
  [filterRow]="{ visible: true }"
  [searchPanel]="{ visible: true }"
>
  <dxi-column dataField="date" dataType="date" caption="Date"></dxi-column>
  <dxi-column dataField="montant" caption="Montant demandé"></dxi-column>
  <dxi-column dataField="statut" caption="Statut" [lookup]="{ dataSource: ['En attente', 'Accepté', 'Refusé'] }"></dxi-column>
  <dxi-column dataField="documents" caption="Documents"></dxi-column>
</dx-data-grid>

<p class="mt-3"><strong>Total remboursé :</strong> {{ totalMontant() }} TND</p>
</div>
